services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kku_library}
      POSTGRES_USER: ${POSTGRES_USER:-kku}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kku_password}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kku} -d ${POSTGRES_DB:-kku_library}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  flyway:
    image: kkpanuwatt/kku-library-flyway:latest
    depends_on:
      db:
        condition: service_healthy
    command: -connectRetries=60 migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-kku_library}
      FLYWAY_USER: ${POSTGRES_USER:-kku}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD:-kku_password}
      FLYWAY_LOCATIONS: filesystem:/flyway/sql
    restart: "no"

  kku-library-api:
    image: kkpanuwatt/kku-library-api:latest
    depends_on:
      db:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    ports:
      - "${HOST_PORT:-3001}:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-kku_library}
      DB_USER: ${POSTGRES_USER:-kku}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-kku_password}
    restart: unless-stopped

volumes:
  db_data:

