name: Deploy kku-library-api

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: kkpanuwatt/kku-library-api:latest

      - name: Build and push Flyway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.flyway
          push: true
          tags: kkpanuwatt/kku-library-flyway:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/kcode-deploy
            COMPOSE="docker compose -f docker-compose.yml -f kku-library-api.compose.yml --env-file kku-library-api.env"
            $COMPOSE pull
            $COMPOSE up -d kku-library-db
            $COMPOSE up kku-library-flyway
            $COMPOSE up -d --force-recreate kku-library-api
